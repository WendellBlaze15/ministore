{% macro product_card(p) -%}
<article class="product-card" data-reveal>
  <a href="{{ url_for('products.detail', slug=p.slug) }}" class="product-thumb">
    {% if p.is_featured %}<span class="badge">✨ Featured</span>{% endif %}
    <img src="{{ p.cover_image or 'https://images.unsplash.com/photo-1606760227091-3dd870d97f1d?auto=format&fit=crop&w=600&q=70' }}" alt="{{ p.name }}" loading="lazy" />
  </a>
  <div class="product-body">
    <span class="product-cat">{{ p.category }}</span>
    <a href="{{ url_for('products.detail', slug=p.slug) }}">
      <h3 class="product-name">{{ p.name }}</h3>
    </a>
    <div class="product-row">
      <span class="product-price">₱{{ "%.2f"|format(p.price|float) }}</span>
      <button class="product-cta" title="Add to cart"
        data-add-to-cart
        data-id="{{ p.id }}"
        data-name="{{ p.name }}"
        data-slug="{{ p.slug }}"
        data-price="{{ p.price }}"
        data-image="{{ p.cover_image or '' }}">
        +
      </button>
    </div>
  </div>
</article>
{%- endmacro %}
