{% set user = session.get('user') %}
<header class="navbar">
  <div class="container nav-inner">
    <a href="{{ url_for('main.home') }}" class="brand">
      <span class="brand-mark">P</span>
      <span>Papier <span style="color: var(--ink-900);">Lab</span></span>
    </a>

    <nav class="nav-links">
      <a href="{{ url_for('main.home') }}" class="{{ 'active' if request.endpoint == 'main.home' else '' }}">Home</a>
      <a href="{{ url_for('products.shop') }}" class="{{ 'active' if request.endpoint and request.endpoint.startswith('products.') else '' }}">Shop</a>
      <a href="{{ url_for('main.about') }}" class="{{ 'active' if request.endpoint == 'main.about' else '' }}">About</a>
      {% if user %}
        <a href="{{ url_for('orders.my_orders') }}" class="{{ 'active' if request.endpoint and request.endpoint.startswith('orders.') else '' }}">Orders</a>
        <a href="{{ url_for('chat.room') }}" class="{{ 'active' if request.endpoint and request.endpoint.startswith('chat.') else '' }}">Chat</a>
        {% if user.role == 'admin' %}
          <a href="{{ url_for('admin.dashboard') }}" class="{{ 'active' if request.endpoint and request.endpoint.startswith('admin.') else '' }}">Admin</a>
        {% endif %}
      {% endif %}
    </nav>

    <div class="nav-tail">
      <button class="icon-btn" data-theme-toggle title="Toggle theme" aria-label="Toggle theme">🌙</button>
      <a class="icon-btn" href="{{ url_for('cart.view') }}" title="Cart" aria-label="Cart">
        <span aria-hidden="true">🛍️</span>
        <span class="cart-pill" data-cart-count style="display:none">0</span>
      </a>
      {% if user %}
        <a class="btn btn-sm btn-secondary hide-on-mobile" href="{{ url_for('auth.logout') }}">Sign out</a>
      {% else %}
        <a class="btn btn-sm btn-secondary hide-on-mobile" href="{{ url_for('auth.login') }}">Sign in</a>
        <a class="btn btn-sm btn-primary hide-on-mobile" href="{{ url_for('auth.register') }}">Join</a>
      {% endif %}
      <button class="icon-btn menu-toggle" data-menu-toggle aria-label="Menu">☰</button>
    </div>
  </div>
</header>
